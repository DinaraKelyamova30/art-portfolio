      <section id="current" class="work-section active-section">

        <div class="art-grid">

          <div class="art-item">
            <img src="assets/Visual_Art/current/Correspondance.webp"
                 alt="Correspondance"
                 loading="lazy"
                 data-title="Correspondance"
                 data-size='16" × 16", Oil on board'
                 data-status="Available"
                 data-desc="Correspondance explores the atmosphere of contemporary transit spaces — environments shaped by movement, routine, and temporary coexistence. Through restrained color, artificial light, and architectural geometry, the painting reflects the emotional experience of urban passage rather than a specific location.">
          </div>

          <div class="art-item">
            <img src="assets/Visual_Art/current/Rouge_sur_neige.webp"
                 alt="Rouge sur neige"
                 loading="lazy"
                 data-title="Rouge sur neige"
                 data-size='24" × 36", Oil on canvas'
                 data-status="Available"
                 data-desc="Rouge sur neige captures a winter evening, where reflections, artificial light, and snowfall transform an ordinary street into a cinematic atmosphere. The glowing red lights reflected on the snowy sidewalk create a visual rhythm that contrasts with the cool blue-gray tones of the city.">
          </div>

          <div class="art-item">
            <img src="assets/Visual_Art/current/l_express.webp"
                 alt="L'Express"
                 loading="lazy"
                 data-title="L'Express"
                 data-size='18" × 18", Oil on board'
                 data-status="Available"
                 data-desc="L’Express captures a fleeting moment of urban life — a quiet pause within movement, where light, reflection, and presence intersect. The scene unfolds through layers of glass and interior space, inviting the viewer to observe without interrupting.">
          </div>

          <div class="art-item">
            <img src="assets/Visual_Art/current/ete_au_parc_de_la_gorge.webp"
                 alt="Été au Parc de la Gorge"
                 loading="lazy"
                 data-title="Été au Parc de la Gorge"
                 data-size='48" × 36", Oil on canvas'
                 data-status="Available"
                 data-desc="Été au Parc de la Gorge captures a quiet summer moment shaped by light and movement. The flowing water, reflections, and surrounding greenery create a sense of calm continuity, where subtle shifts in color and texture suggest both stillness and motion. The scene invites the viewer to slow down and observe the natural rhythm of the landscape.">
          </div>

          <div class="art-item">
            <img src="assets/Visual_Art/current/boulevard_de_maisonneuve.webp"
                 alt="Boulevard de Maisonneuve"
                 loading="lazy"
                 data-title="Boulevard de Maisonneuve"
                 data-size='12" × 16", Oil on canvas'
                 data-status="Available"
                 data-desc="Boulevard de Maisonneuve shows the brief coexistence of downtown life and nature through the pink skies of Montreal’s summer sunsets. The bright colours along the dark buildings and lights that signal the end of the day allows the viewer to stop and briefly bask in the city warmth. The painting colours and perspective invites the viewer into a dreamy nostalgia and draws on themes of curiosity and stillness.">
          </div>

          <div class="art-item">
            <img src="assets/Visual_Art/current/boulevard_pie-IX.webp"
                 alt="Boulevard Pie-IX"
                 loading="lazy"
                 data-title="Boulevard Pie-IX"
                 data-size='12" × 16", Oil on canvas'
                 data-status="Available"
                 data-desc="Boulevard Pie-IX captures the rhythm of a city waking up, with the rising sun warming the boulevard and its commuters. With its composition, lighting and perspective, the painting amplifies a feeling of connection - with the environment, the sun, and the waking citizens who share it.">
          </div>

          <div class="art-item">
            <img src="assets/Visual_Art/current/observateur.webp"
                 alt="Observateur"
                 loading="lazy"
                 data-title="Observateur"
                 data-size='14" × 11", Oil on canvas'
                 data-status="Prints available"
                 data-desc="Observateur shows an evening scene in which the viewer participates as an observer. The composition of the painting amplifies the feeling of being a watcher, which allows for a personal interpretation of the scene. With its perspective, the painting transforms the observer into a participant, which plays on themes of distances and togetherness in social spaces.">
          </div>

          <div class="art-item">
            <img src="assets/Visual_Art/current/sens_unique.webp"
                 alt="Sens Unique"
                 loading="lazy"
                 data-title="Sens Unique"
                 data-size='14" × 18", Oil on canvas'
                 data-status="Available"
                 data-desc="Sens Unique presents a subway staircase flooded with sunlight towards which the viewer emerges from the dark. The brush strokes enhance the visual haze in which the figures travel to their respective direction. Through its use of colour, light, and direction, the painting reflects the rhythm of public life, drawing on themes of anonymity, movement and transitions.">
          </div>
